    <style>
        /* Custom Modern Dashboard Foundations */
        :root {
            --primary: #4f46e5;
            --primary-hover: #4338ca;
            --success: #10b981;
            --success-hover: #059669;
            --warning: #f59e0b;
            --danger: #ef4444;
            --danger-hover: #dc2626;
            --dark: #0f172a;
            --slate-700: #334155;
            --slate-100: #f1f5f9;
            --border: #e2e8f0;
        }

        * { 
            box-sizing: border-box; 
            -webkit-tap-highlight-color: transparent; 
            margin: 0; 
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        }

        body {
            background-color: #f8fafc; 
            color: #1e293b; 
            padding: 16px;
            line-height: 1.5;
        }

        .app-shell {
            max-width: 640px; 
            margin: 0 auto; 
            background: #ffffff; 
            border-radius: 20px; 
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.05), 0 8px 10px -6px rgba(0, 0, 0, 0.05);
            overflow: hidden;
            border: 1px solid var(--border);
        }

        /* Top Bar Styling */
        .system-header {
            background: var(--dark);
            color: #ffffff;
            padding: 18px;
            text-align: center;
            position: relative;
        }

        .system-header h1 {
            font-size: 18px;
            font-weight: 700;
            letter-spacing: 0.5px;
        }

        .system-header p {
            font-size: 11px;
            color: #94a3b8;
            text-transform: uppercase;
            margin-top: 2px;
            font-weight: 600;
        }

        /* Banner Notifications */
        .banner {
            padding: 12px 16px;
            font-size: 13px;
            font-weight: 600;
            text-align: center;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }
        .banner-alert { background-color: #fef3c7; color: #92400e; border-bottom: 1px solid #fde68a; }
        .banner-maintenance { background-color: #fee2e2; color: #991b1b; border-bottom: 1px solid #fca5a5; }

        .content-body {
            padding: 20px;
        }

        /* Login Portal Design */
        #gateway-portal {
            padding: 10px 0;
        }

        .portal-msg {
            text-align: center;
            margin-bottom: 24px;
        }

        .portal-msg h2 { font-size: 22px; color: #0f172a; font-weight: 800; }
        .portal-msg p { font-size: 14px; color: #64748b; margin-top: 4px; }

        .role-group-label {
            font-size: 12px;
            font-weight: 700;
            color: #64748b;
            text-transform: uppercase;
            margin: 16px 0 8px 4px;
            letter-spacing: 0.5px;
        }

        .btn-profile-login {
            width: 100%;
            background: #ffffff;
            border: 1px solid var(--border);
            padding: 16px;
            margin-bottom: 10px;
            border-radius: 12px;
            font-size: 15px;
            font-weight: 600;
            color: #334155;
            cursor: pointer;
            display: flex;
            justify-content: space-between;
            align-items: center;
            transition: all 0.2s ease;
            box-shadow: 0 1px 2px rgba(0,0,0,0.02);
        }

        .btn-profile-login:hover {
            border-color: var(--primary);
            background: #f5f3ff;
        }

        .btn-profile-login .badge {
            font-size: 11px;
            padding: 4px 8px;
            border-radius: 6px;
            font-weight: 700;
        }
        .badge-admin { background: #fee2e2; color: #991b1b; }
        .badge-crew { background: #e0f2fe; color: #0369a1; }

        /* App View Controls & Navigation */
        .user-nav-context {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: var(--slate-100);
            padding: 12px 16px;
            border-radius: 12px;
            margin-bottom: 20px;
        }

        .user-meta-info {
            display: flex;
            flex-direction: column;
        }
        .user-meta-info .name { font-weight: 700; font-size: 15px; color: #0f172a; }
        .user-meta-info .role { font-size: 12px; color: #64748b; text-transform: uppercase; font-weight: 600; }

        .btn-action-sm {
            padding: 8px 14px;
            border-radius: 8px;
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            border: none;
            transition: all 0.2s;
        }
        .btn-logout { background: #fee2e2; color: #991b1b; }
        .btn-logout:hover { background: #fca5a5; }
        .btn-admin-panel-toggle { background: #f59e0b; color: #fff; margin-right: 6px; }

        /* Work Record Input Modules */
        .module-section {
            background: #ffffff;
            border: 1px solid var(--border);
            border-radius: 14px;
            padding: 16px;
            margin-bottom: 16px;
        }

        .section-title {
            font-size: 14px;
            font-weight: 700;
            color: #475569;
            text-transform: uppercase;
            margin-bottom: 12px;
            letter-spacing: 0.5px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .form-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
        }
        .form-full-width { grid-column: span 2; }

        .field-group {
            display: flex;
            flex-direction: column;
            gap: 6px;
        }

        .field-group label {
            font-size: 12px;
            font-weight: 600;
            color: #64748b;
        }

        .input-ctrl {
            width: 100%;
            padding: 10px 12px;
            border: 1px solid var(--border);
            border-radius: 8px;
            font-size: 15px;
            background: #fff;
            color: #0f172a;
            outline: none;
            transition: border 0.2s;
        }
        .input-ctrl:focus { border-color: var(--primary); }

        /* Dynamic Counter Inventory Row */
        .inventory-list { display: flex; flex-direction: column; gap: 10px; }
        
        .inventory-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 12px;
            background: #f8fafc;
            border-radius: 10px;
            border: 1px solid var(--border);
        }

        .inv-meta h4 { font-size: 14px; font-weight: 700; color: #1e293b; }
        .inv-meta p { font-size: 11px; color: #64748b; }

        .counter-widget {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .btn-counter {
            width: 32px;
            height: 32px;
            border-radius: 6px;
            border: 1px solid var(--border);
            background: #fff;
            font-weight: 700;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: background 0.15s;
        }
        .btn-counter:hover { background: var(--slate-100); }

        .counter-field {
            width: 50px;
            text-align: center;
            font-weight: 700;
            font-size: 15px;
            border: 1px solid var(--border);
            border-radius: 6px;
            padding: 4px 0;
        }

        .row-total-cost {
            width: 65px;
            text-align: right;
            font-size: 13px;
            font-weight: 700;
            color: #475569;
        }

        /* Real-time Math Summary Dash & Target Metrics */
        .aggregate-hero {
            background: var(--dark);
            color: #fff;
            border-radius: 14px;
            padding: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 16px;
        }
        .aggregate-hero div p { font-size: 12px; color: #94a3b8; font-weight: 600; text-transform: uppercase; }
        .aggregate-hero div h3 { font-size: 28px; font-weight: 800; color: #38bdf8; }

        .efficiency-metrics-block {
            background: #eff6ff;
            border: 1px solid #bfdbfe;
            border-radius: 14px;
            padding: 16px;
            margin-bottom: 20px;
        }
        
        .metrics-subgrid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
            margin-top: 10px;
        }

        .metric-card-mini {
            background: #fff;
            border: 1px solid #dbeafe;
            padding: 10px;
            border-radius: 8px;
            text-align: center;
        }
        .metric-card-mini span { font-size: 11px; text-transform: uppercase; font-weight: 700; color: #64748b; }
        .metric-card-mini p { font-size: 15px; font-weight: 700; margin-top: 2px; }

        .status-optimal { color: var(--success); }
        .status-deficit { color: var(--danger); }

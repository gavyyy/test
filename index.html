<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title id="html-page-title">Roundtable — Pull up a chair</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link id="google-font-link" href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600;9..144,700&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@500&display=swap" rel="stylesheet">
<style>
  :root{
    --teal-deep:#1B3A3A;
    --paper:#FDFBF6;
    --amber:#E8A33D;
    --ink:#2A2E2C;
    --sage:#C4D6D3;
    --teal-mid:#2E5555;
    --line: rgba(42,46,44,0.14);
  }
  *{box-sizing:border-box; margin:0; padding:0;}
  html{scroll-behavior:smooth;}
  body{
    background:var(--paper);
    color:var(--ink);
    font-family:'Inter', sans-serif;
    line-height:1.5;
    -webkit-font-smoothing:antialiased;
  }
  h1,h2,h3{
    font-family:'Fraunces', serif;
    font-weight:600;
    letter-spacing:-0.01em;
    color:var(--teal-deep);
  }
  .eyebrow{
    font-family:'JetBrains Mono', monospace;
    font-size:0.72rem;
    letter-spacing:0.12em;
    text-transform:uppercase;
    color:var(--teal-mid);
  }
  a{color:inherit;}
  .wrap{max-width:1120px; margin:0 auto; padding:0 32px;}

  /* Header */
  header{
    position:sticky; top:0; z-index:50;
    background:rgba(253,251,246,0.9);
    backdrop-filter:blur(8px);
    border-bottom:1px solid var(--line);
  }
  .nav{
    display:flex; align-items:center; justify-content:space-between;
    padding:18px 32px;
    max-width:1120px; margin:0 auto;
  }
  .logo{
    font-family:'Fraunces', serif;
    font-weight:700;
    font-size:1.3rem;
    color:var(--teal-deep);
    display:flex; align-items:center; gap:8px;
  }
  .logo .dot{width:9px; height:9px; border-radius:50%; background:var(--amber); display:inline-block;}
  .nav-links{display:flex; gap:32px; align-items:center;}
  .nav-links a{
    font-size:0.92rem; font-weight:500; color:var(--ink);
    text-decoration:none; opacity:0.75;
    transition:opacity .2s;
  }
  .nav-links a:hover{opacity:1;}
  .btn{
    display:inline-flex; align-items:center; justify-content:center;
    padding:11px 22px;
    border-radius:100px;
    font-weight:600; font-size:0.92rem;
    text-decoration:none;
    border:1px solid transparent;
    cursor:pointer;
    transition:transform .15s ease, box-shadow .15s ease;
  }
  .btn-primary{background:var(--teal-deep); color:var(--paper);}
  .btn-primary:hover{transform:translateY(-1px); box-shadow:0 6px 16px rgba(27,58,58,0.25);}
  .btn-danger{background:#e53e3e; color:white;}
  .btn-danger:hover{background:#c53030; transform:translateY(-1px);}
  .btn:focus-visible{outline:3px solid var(--amber); outline-offset:2px;}

  /* Maintenance overlay */
  #maintenance-overlay {
    display: none;
    position: fixed; inset: 0; background: var(--teal-deep); color: var(--paper);
    z-index: 9999; flex-direction: column; align-items: center; justify-content: center; text-align: center; padding: 32px;
  }
  #maintenance-overlay h1 { font-size: 2.5rem; margin-bottom: 16px; color: var(--amber); }
  #maintenance-overlay p { font-size: 1.1rem; opacity: 0.85; max-width: 500px; }

  /* Hero */
  .hero{
    padding:96px 32px 60px;
    position:relative;
    overflow:hidden;
  }
  .hero-grid{
    max-width:1120px; margin:0 auto;
    display:grid;
    grid-template-columns:1.05fr 0.95fr;
    gap:56px;
    align-items:center;
  }
  .hero h1{
    font-size:clamp(2.4rem, 4.6vw, 3.6rem);
    line-height:1.06;
    margin-bottom:22px;
  }
  .hero h1 em{
    font-style:italic;
    color:var(--amber);
  }
  .hero p.lead{
    font-size:1.12rem;
    color:#4b4f4d;
    max-width:460px;
    margin-bottom:32px;
  }
  .hero-ctas{display:flex; gap:14px; align-items:center; flex-wrap:wrap;}
  .btn-ghost{
    background:transparent; color:var(--teal-deep);
    border:1px solid var(--line);
  }
  .btn-ghost:hover{border-color:var(--teal-deep);}
  .hero-note{
    margin-top:20px; font-size:0.85rem; color:#6b6f6d;
  }

  /* Table visual with 8 interactive member seats around a round table */
  .table-visual{
    position:relative;
    width:100%;
    aspect-ratio:1/1;
    max-width:460px;
    margin:0 auto;
  }
  .table-top{
    position:absolute; inset:22%;
    border-radius:50%;
    background:radial-gradient(circle at 35% 30%, #2E5555, var(--teal-deep) 70%);
    box-shadow:0 20px 50px rgba(27,58,58,0.28), inset 0 0 0 1px rgba(255,255,255,0.06);
    display:flex; align-items:center; justify-content:center;
    text-align:center;
    color:rgba(253,251,246,0.7);
    font-size:0.82rem;
    font-family:'JetBrains Mono', monospace;
    padding:20px;
  }
  .table-top::after{
    content:"";
    position:absolute; inset:14%;
    border-radius:50%;
    border:1px dashed rgba(253,251,246,0.25);
    pointer-events:none;
  }
  .seat{
    position:absolute;
    width:64px; height:64px;
    border-radius:50%;
    display:flex; align-items:center; justify-content:center;
    box-shadow:0 8px 20px rgba(27,58,58,0.22);
    cursor:pointer;
    transition:transform .2s ease, box-shadow .2s ease;
    background:var(--paper);
    border:2px solid var(--amber);
    overflow:hidden;
  }
  .seat:hover{transform:scale(1.1); box-shadow:0 12px 28px rgba(27,58,58,0.3); z-index:10;}
  .seat img{
    width:100%; height:100%; object-fit:cover;
  }
  /* Positioning 8 seats evenly around the circular table */
  .seat:nth-child(2){top:-2%; left:50%; transform:translateX(-50%);}
  .seat:nth-child(3){top:12%; right:4%;}
  .seat:nth-child(4){top:50%; right:-2%; transform:translateY(-50%);}
  .seat:nth-child(5){bottom:12%; right:4%;}
  .seat:nth-child(6){bottom:-2%; left:50%; transform:translateX(-50%);}
  .seat:nth-child(7){bottom:12%; left:4%;}
  .seat:nth-child(8){top:50%; left:-2%; transform:translateY(-50%);}
  .seat:nth-child(9){top:12%; left:4%;}

  /* Section shared */
  section{padding:88px 32px;}
  .section-head{max-width:600px; margin-bottom:52px;}
  .section-head h2{font-size:clamp(1.8rem, 3vw, 2.4rem); margin-top:10px;}

  /* How it works */
  .steps{
    display:grid;
    grid-template-columns:repeat(3, 1fr);
    gap:1px;
    background:var(--line);
    border:1px solid var(--line);
    border-radius:16px;
    overflow:hidden;
  }
  .step{
    background:var(--paper);
    padding:36px 30px;
  }
  .step .num{
    font-family:'JetBrains Mono', monospace;
    color:var(--amber);
    font-size:0.85rem;
    font-weight:500;
    margin-bottom:18px;
    display:block;
  }
  .step h3{font-size:1.2rem; margin-bottom:10px;}
  .step p{color:#5a5e5c; font-size:0.95rem;}

  /* Circles / interests */
  .circles{
    display:grid;
    grid-template-columns:repeat(4, 1fr);
    gap:16px;
  }
  .circle-card{
    background:var(--teal-deep);
    border-radius:16px;
    padding:26px 22px;
    color:var(--paper);
    min-height:150px;
    display:flex; flex-direction:column; justify-content:space-between;
    transition:transform .2s ease;
  }
  .circle-card:hover{transform:translateY(-4px);}
  .circle-card:nth-child(2){background:var(--teal-mid);}
  .circle-card:nth-child(3){background:#3d6b63;}
  .circle-card:nth-child(4){background:#4a7a68;}
  .circle-card:nth-child(5){background:#2E5555;}
  .circle-card:nth-child(6){background:var(--teal-deep);}
  .circle-card:nth-child(7){background:var(--teal-mid);}
  .circle-card:nth-child(8){background:#3d6b63;}
  .circle-name{font-family:'Fraunces', serif; font-size:1.15rem; font-weight:600;}
  .circle-meta{font-size:0.82rem; opacity:0.75; font-family:'JetBrains Mono', monospace;}

  /* Testimonials */
  .quotes{
    display:grid;
    grid-template-columns:repeat(3, 1fr);
    gap:24px;
  }
  .quote-card{
    background:var(--sage);
    border-radius:16px;
    padding:30px 26px;
  }
  .quote-card p{font-size:1rem; color:var(--ink); margin-bottom:18px;}
  .quote-who{font-family:'JetBrains Mono', monospace; font-size:0.78rem; color:var(--teal-deep);}

  /* CTA band */
  .cta-band{
    background:var(--teal-deep);
    color:var(--paper);
    border-radius:24px;
    margin:0 32px 88px;
    padding:64px 48px;
    text-align:center;
  }
  .cta-band h2{color:var(--paper); font-size:clamp(1.8rem,3.4vw,2.6rem); margin-bottom:16px;}
  .cta-band p{color:rgba(253,251,246,0.75); max-width:480px; margin:0 auto 30px;}
  .btn-amber{background:var(--amber); color:var(--teal-deep);}
  .btn-amber:hover{transform:translateY(-1px); box-shadow:0 8px 20px rgba(232,163,61,0.35);}

  .locate-box{
    margin-top:34px;
    padding-top:30px;
    border-top:1px solid rgba(253,251,246,0.15);
  }
  .locate-label{
    font-size:0.88rem;
    color:rgba(253,251,246,0.65);
    margin-bottom:14px;
  }
  .btn-ghost-amber{
    background:transparent;
    color:var(--amber);
    border:1px solid rgba(232,163,61,0.5);
  }
  .btn-ghost-amber:hover{border-color:var(--amber); background:rgba(232,163,61,0.08);}
  .locate-status{
    margin-top:14px;
    font-family:'JetBrains Mono', monospace;
    font-size:0.82rem;
    color:rgba(253,251,246,0.75);
    min-height:1.2em;
  }

  /* Admin Section Styles */
  #admin-section {
    background: #f0ede6;
    border-top: 2px solid var(--amber);
    padding: 60px 32px;
  }
  .admin-panel-card {
    background: white;
    border-radius: 16px;
    padding: 32px;
    max-width: 960px;
    margin: 0 auto;
    box-shadow: 0 10px 30px rgba(0,0,0,0.08);
  }
  .admin-login-box {
    text-align: center;
    max-width: 400px;
    margin: 0 auto;
  }
  .admin-login-box input {
    width: 100%;
    padding: 12px 16px;
    border: 1px solid var(--line);
    border-radius: 8px;
    margin-bottom: 16px;
    font-size: 1rem;
    outline: none;
  }
  .admin-login-box input:focus { border-color: var(--teal
